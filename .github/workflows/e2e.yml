name: E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      KUBECONFIG: /tmp/carbide-e2e-kubeconfig
      NVIDIA_CARBIDE_API_ENDPOINT: http://localhost:8388
      NVIDIA_CARBIDE_KEYCLOAK_URL: http://localhost:8082
      NVIDIA_CARBIDE_API_ENDPOINT_INTERNAL: http://carbide-rest-api.carbide-rest.svc:8388
      IMG: localhost/cluster-api-provider-nvidia-carbide:e2e
    steps:
      - name: Checkout provider
        uses: actions/checkout@v4

      - name: Checkout NVIDIA bare-metal-manager-rest
        uses: actions/checkout@v4
        with:
          repository: NVIDIA/bare-metal-manager-rest
          path: bare-metal-manager-rest

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Deploy Carbide REST stack
        run: make kind-reset
        working-directory: bare-metal-manager-rest
        timeout-minutes: 20

      - name: Verify Carbide API health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8388/healthz; then
              echo "API is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "API health check failed"
          exit 1

      - name: Export kubeconfig
        run: kind get kubeconfig --name carbide-rest-local > $KUBECONFIG

      - name: Build and load provider image
        run: |
          make docker-build IMG=$IMG
          kind load docker-image $IMG --name carbide-rest-local

      - name: Install Cluster API CRDs
        run: |
          kubectl apply --server-side \
            -f https://github.com/kubernetes-sigs/cluster-api/releases/download/v1.12.1/core-components.yaml \
            --force-conflicts || true
          kubectl wait --for=condition=Established \
            crd/clusters.cluster.x-k8s.io \
            crd/machines.cluster.x-k8s.io --timeout=60s
          kubectl delete mutatingwebhookconfiguration \
            capi-mutating-webhook-configuration --ignore-not-found
          kubectl delete validatingwebhookconfiguration \
            capi-validating-webhook-configuration --ignore-not-found

      - name: Install provider CRDs and deploy controller
        run: |
          make install
          make deploy IMG=$IMG
          kubectl wait --for=condition=Available deployment \
            -l control-plane=controller-manager \
            -n cluster-api-provider-nvidia-carbide-system --timeout=5m

      - name: Run e2e tests
        run: make test-e2e-live
