name: E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout provider
        uses: actions/checkout@v4

      - name: Checkout NVIDIA bare-metal-manager-rest
        uses: actions/checkout@v4
        with:
          repository: NVIDIA/bare-metal-manager-rest
          path: bare-metal-manager-rest

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Deploy Carbide REST stack
        run: make kind-reset
        working-directory: bare-metal-manager-rest
        timeout-minutes: 20

      - name: Verify Carbide API health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8388/healthz; then
              echo "API is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "API health check failed"
          exit 1

      - name: Build and load provider image
        run: |
          make docker-build IMG=localhost/cluster-api-provider-nvidia-carbide:e2e
          kind load docker-image localhost/cluster-api-provider-nvidia-carbide:e2e \
            --name carbide-rest-local

      - name: Install cert-manager
        run: |
          kind get kubeconfig --name carbide-rest-local > /tmp/carbide-e2e-kubeconfig
          KUBECONFIG=/tmp/carbide-e2e-kubeconfig kubectl apply \
            -f https://github.com/cert-manager/cert-manager/releases/download/v1.14.4/cert-manager.yaml
          KUBECONFIG=/tmp/carbide-e2e-kubeconfig kubectl wait \
            --for=condition=Available deployment/cert-manager-webhook \
            -n cert-manager --timeout=5m

      - name: Install Cluster API core components
        run: |
          KUBECONFIG=/tmp/carbide-e2e-kubeconfig kubectl apply \
            -f https://github.com/kubernetes-sigs/cluster-api/releases/download/v1.12.1/core-components.yaml
          KUBECONFIG=/tmp/carbide-e2e-kubeconfig kubectl wait \
            --for=condition=Available deployment/capi-controller-manager \
            -n capi-system --timeout=5m

      - name: Install provider CRDs and deploy controller
        run: |
          KUBECONFIG=/tmp/carbide-e2e-kubeconfig make install
          KUBECONFIG=/tmp/carbide-e2e-kubeconfig make deploy \
            IMG=localhost/cluster-api-provider-nvidia-carbide:e2e
          KUBECONFIG=/tmp/carbide-e2e-kubeconfig kubectl wait \
            --for=condition=Available deployment \
            -l control-plane=controller-manager \
            -n cluster-api-provider-nvidia-carbide-system --timeout=5m

      - name: Run e2e tests
        run: make test-e2e-live
        env:
          NVIDIA_CARBIDE_API_ENDPOINT: http://localhost:8388
          NVIDIA_CARBIDE_KEYCLOAK_URL: http://localhost:8082
          IMG: localhost/cluster-api-provider-nvidia-carbide:e2e
