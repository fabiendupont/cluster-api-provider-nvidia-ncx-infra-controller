name: E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      KUBECONFIG: /tmp/ncx-e2e-kubeconfig
      NCX_INFRA_API_ENDPOINT: http://localhost:8388
      NCX_INFRA_KEYCLOAK_URL: http://localhost:8082
      NCX_INFRA_API_ENDPOINT_INTERNAL: http://carbide-rest-api.carbide-rest.svc:8388
      IMG: localhost/cluster-api-provider-nvidia-ncx-infra-controller:e2e
    steps:
      - name: Checkout provider
        uses: actions/checkout@v4

      - name: Checkout NVIDIA ncx-infra-controller-rest
        uses: actions/checkout@v4
        with:
          repository: fabiendupont/nvidia-ncx-infra-controller-rest
          ref: extensible-architecture
          path: ncx-infra-controller-rest

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Increase inotify limits
        run: sudo sysctl -w fs.inotify.max_user_instances=512

      - name: Deploy NCX Infra Controller REST stack
        run: make kind-reset
        working-directory: ncx-infra-controller-rest
        timeout-minutes: 20
        env:
          KUBECONFIG: ""

      - name: Verify NCX Infra Controller API health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8388/healthz; then
              echo "API is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "API health check failed"
          exit 1

      - name: Export kubeconfig
        run: kind get kubeconfig --name carbide-rest-local > $KUBECONFIG

      - name: Build and load provider image
        run: |
          make docker-build IMG=$IMG
          kind load docker-image $IMG --name carbide-rest-local

      - name: Install cert-manager
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.17.2/cert-manager.yaml
          kubectl wait --for=condition=Available deployment \
            --all -n cert-manager --timeout=3m

      - name: Install Cluster API CRDs
        run: |
          kubectl apply --server-side \
            -f https://github.com/kubernetes-sigs/cluster-api/releases/download/v1.12.1/core-components.yaml \
            --force-conflicts || true
          kubectl wait --for=condition=Established \
            crd/clusters.cluster.x-k8s.io \
            crd/machines.cluster.x-k8s.io --timeout=60s
          kubectl delete mutatingwebhookconfiguration \
            capi-mutating-webhook-configuration --ignore-not-found
          kubectl delete validatingwebhookconfiguration \
            capi-validating-webhook-configuration --ignore-not-found

      - name: Install provider CRDs and deploy controller
        run: |
          make install
          make deploy IMG=$IMG
          kubectl wait --for=condition=Available deployment \
            -l control-plane=controller-manager \
            -n capi-ncx-infra-system --timeout=5m || {
            echo "=== Deployment status ==="
            kubectl get deployment -n capi-ncx-infra-system -o wide
            echo "=== Pod status ==="
            kubectl get pods -n capi-ncx-infra-system -o wide
            echo "=== Pod describe ==="
            kubectl describe pods -n capi-ncx-infra-system
            echo "=== Pod logs ==="
            kubectl logs -l control-plane=controller-manager \
              -n capi-ncx-infra-system --tail=100 || true
            echo "=== Certificate status ==="
            kubectl get certificate -n capi-ncx-infra-system -o wide
            echo "=== Secrets ==="
            kubectl get secrets -n capi-ncx-infra-system
            exit 1
          }

      - name: Run e2e tests
        run: |
          make test-e2e-live || true
          echo "=== Controller logs ==="
          kubectl logs -l control-plane=controller-manager \
            -n capi-ncx-infra-system --tail=200
          # Re-run to get correct exit code
          make test-e2e-live
