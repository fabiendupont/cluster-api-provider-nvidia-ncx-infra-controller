apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: '[]'
  name: cluster-api-provider-nvidia-ncx-infra-controller.v0.1.0
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
      - description: NcxInfraCluster is the Schema for the ncxinfraclusters API
        displayName: NVIDIA NCX Infra Cluster
        kind: NcxInfraCluster
        name: ncxinfraclusters.infrastructure.cluster.x-k8s.io
        version: v1beta1
      - description: NcxInfraMachine is the Schema for the ncxinframachines API
        displayName: NVIDIA NCX Infra Machine
        kind: NcxInfraMachine
        name: ncxinframachines.infrastructure.cluster.x-k8s.io
        version: v1beta1
      - description: NcxInfraMachineTemplate is the Schema for the ncxinframachinetemplates API
        displayName: NVIDIA NCX Infra Machine Template
        kind: NcxInfraMachineTemplate
        name: ncxinframachinetemplates.infrastructure.cluster.x-k8s.io
        version: v1beta1
  description: |
    Cluster API infrastructure provider for the NVIDIA NCX Infra Controller
    bare-metal platform.

    This operator enables declarative provisioning and lifecycle management of
    Kubernetes clusters on NVIDIA NCX infrastructure using the Cluster API
    standard.

    ## Features

    - Declarative cluster infrastructure provisioning via NcxInfraCluster
    - Machine lifecycle management via NcxInfraMachine
    - Machine templates for control plane and worker node scaling
    - VPC, subnet, network security group, and VPC peering automation
    - Explicit IP address selection for network interfaces
    - Integration with Cluster API controllers for full cluster lifecycle
  displayName: Cluster API Provider NVIDIA NCX Infra Controller
  icon:
    - base64data: ""
      mediatype: image/svg+xml
  install:
    spec:
      clusterPermissions:
        - rules:
            - apiGroups:
                - ""
              resources:
                - secrets
              verbs:
                - get
                - list
                - watch
            - apiGroups:
                - cluster.x-k8s.io
              resources:
                - clusters
                - machines
              verbs:
                - get
                - list
                - watch
            - apiGroups:
                - cluster.x-k8s.io
              resources:
                - machines/status
              verbs:
                - get
                - patch
                - update
            - apiGroups:
                - infrastructure.cluster.x-k8s.io
              resources:
                - ncxinfraclusters
                - ncxinframachines
              verbs:
                - create
                - delete
                - get
                - list
                - patch
                - update
                - watch
            - apiGroups:
                - infrastructure.cluster.x-k8s.io
              resources:
                - ncxinfraclusters/finalizers
                - ncxinframachines/finalizers
              verbs:
                - update
            - apiGroups:
                - infrastructure.cluster.x-k8s.io
              resources:
                - ncxinfraclusters/status
                - ncxinframachines/status
              verbs:
                - get
                - patch
                - update
          serviceAccountName: cluster-api-provider-nvidia-ncx-infra-controller-controller-manager
      deployments:
        - label:
            control-plane: controller-manager
            app.kubernetes.io/name: cluster-api-provider-nvidia-ncx-infra-controller
          name: cluster-api-provider-nvidia-ncx-infra-controller-controller-manager
          spec:
            replicas: 1
            selector:
              matchLabels:
                control-plane: controller-manager
                app.kubernetes.io/name: cluster-api-provider-nvidia-ncx-infra-controller
            template:
              metadata:
                annotations:
                  kubectl.kubernetes.io/default-container: manager
                labels:
                  control-plane: controller-manager
                  app.kubernetes.io/name: cluster-api-provider-nvidia-ncx-infra-controller
              spec:
                containers:
                  - args:
                      - --leader-elect
                      - --health-probe-bind-address=:8081
                    command:
                      - /manager
                    image: ghcr.io/fabiendupont/cluster-api-provider-nvidia-ncx-infra-controller:v0.1.0
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: 8081
                      initialDelaySeconds: 15
                      periodSeconds: 20
                    name: manager
                    readinessProbe:
                      httpGet:
                        path: /readyz
                        port: 8081
                      initialDelaySeconds: 5
                      periodSeconds: 10
                    resources:
                      limits:
                        cpu: 500m
                        memory: 128Mi
                      requests:
                        cpu: 10m
                        memory: 64Mi
                    securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
                      readOnlyRootFilesystem: true
                securityContext:
                  runAsNonRoot: true
                  seccompProfile:
                    type: RuntimeDefault
                serviceAccountName: cluster-api-provider-nvidia-ncx-infra-controller-controller-manager
                terminationGracePeriodSeconds: 10
      permissions:
        - rules:
            - apiGroups:
                - ""
              resources:
                - configmaps
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
            - apiGroups:
                - coordination.k8s.io
              resources:
                - leases
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
            - apiGroups:
                - ""
              resources:
                - events
              verbs:
                - create
                - patch
          serviceAccountName: cluster-api-provider-nvidia-ncx-infra-controller-controller-manager
    strategy: deployment
  installModes:
    - supported: true
      type: OwnNamespace
    - supported: true
      type: SingleNamespace
    - supported: false
      type: MultiNamespace
    - supported: true
      type: AllNamespaces
  keywords:
    - cluster-api
    - nvidia
    - carbide
    - bare-metal
    - kubernetes
    - infrastructure
  links:
    - name: Source Code
      url: https://github.com/fabiendupont/cluster-api-provider-nvidia-ncx-infra-controller
  maintainers:
    - email: fdupont@nvidia.com
      name: Fabien Dupont
  maturity: alpha
  provider:
    name: NVIDIA
  version: 0.1.0
